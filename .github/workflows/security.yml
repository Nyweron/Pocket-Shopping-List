name: Security Checks

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  secret-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scan
        run: npm run check:secrets

      - name: Lint
        run: npm run lint
