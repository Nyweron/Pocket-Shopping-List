@if (user()) {
  <div class="profile-container">
    <div class="profile-card">
      <app-back-control [routerLink]="backLink()" />
      <h1>{{ 'profile.title' | translate }}</h1>

      <div class="profile-info">
        <div class="info-item">
          <label>{{ 'profile.label_email' | translate }}</label>
          <span>{{ user()!.email }}</span>
        </div>
        <div class="info-item">
          <label>{{ 'profile.label_username' | translate }}</label>
          <span>{{ user()!.username }}</span>
        </div>
        <div class="info-item">
          <label>{{ 'profile.label_registered' | translate }}</label>
          <span>{{ user()!.createdAt | date:'short' }}</span>
        </div>
      </div>

      <button class="btn-logout" (click)="logout()">
        {{ 'profile.logout' | translate }}
      </button>
    </div>
  </div>
}
