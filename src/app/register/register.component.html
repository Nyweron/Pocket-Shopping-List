<div class="register-container">
  <div class="register-card">
    <h1>Rejestracja</h1>
    
    <div class="demo-info">
      <p class="demo-info-title">ℹ️ Aplikacja DEMO</p>
      <p class="demo-info-text">
        To jest wersja demonstracyjna. Możesz utworzyć własne konto lub użyć testowego konta do logowania.
      </p>
    </div>
    
    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          class="form-input"
          placeholder="twoj@email.pl"
        />
      </div>

      <div class="form-group">
        <label for="username">Nazwa użytkownika</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          class="form-input"
          placeholder="Nazwa użytkownika"
        />
      </div>

      <div class="form-group">
        <label for="password">Hasło</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          class="form-input"
          placeholder="Hasło (min. 6 znaków)"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Potwierdź hasło</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          class="form-input"
          placeholder="Potwierdź hasło"
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading()">
        @if (isLoading()) {
          Rejestrowanie...
        } @else {
          Zarejestruj się
        }
      </button>
    </form>

    <div class="login-link">
      <p>Masz już konto? <a [routerLink]="['/login']">Zaloguj się</a></p>
    </div>
  </div>
</div>
