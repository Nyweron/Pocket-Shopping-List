<div class="register-container">
  <div class="register-card">
    <h1>{{ 'auth.register_title' | translate }}</h1>

    <div class="demo-info">
      <p class="demo-info-title">{{ 'auth.register_demo_title' | translate }}</p>
      <p class="demo-info-text">
        {{ 'auth.register_demo_text' | translate }}
      </p>
    </div>

    @if (error()) {
      <div class="error-message">{{ error()! | translate }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-group">
        <label for="email">{{ 'auth.field_email' | translate }}</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          class="form-input"
          [placeholder]="'auth.placeholder_email' | translate"
        />
      </div>

      <div class="form-group">
        <label for="username">{{ 'auth.field_username' | translate }}</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          required
          class="form-input"
          [placeholder]="'auth.placeholder_username' | translate"
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'auth.field_password' | translate }}</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          class="form-input"
          [placeholder]="'auth.placeholder_password_min' | translate"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">{{ 'auth.field_confirm_password' | translate }}</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          class="form-input"
          [placeholder]="'auth.placeholder_confirm_password' | translate"
        />
      </div>

      <button type="submit" class="btn-submit" [disabled]="isLoading()">
        @if (isLoading()) {
          {{ 'auth.register_loading' | translate }}
        } @else {
          {{ 'auth.register_submit' | translate }}
        }
      </button>
    </form>

    <div class="login-link">
      <p>
        {{ 'auth.footer_has_account' | translate }}
        <a [routerLink]="['/login']">{{ 'auth.footer_login' | translate }}</a>
      </p>
    </div>
  </div>
</div>
